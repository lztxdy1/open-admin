server:
  port: 8080

spring:
  application:
    name: open-admin
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:open_admin;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  sql:
    init:
      mode: always
      encoding: UTF-8
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 50MB

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    banner: false
    db-config:
      id-type: auto

springdoc:
  swagger-ui:
    path: /swagger-ui.html

open-admin:
  upload-path: uploads
